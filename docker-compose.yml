services:
  xreader:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://xreader:xreader@postgres:5432/xreader?sslmode=disable
      SESSION_SECRET: "${SESSION_SECRET:?set SESSION_SECRET - generate with openssl rand -hex 32}"
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: xreader
      POSTGRES_PASSWORD: xreader
      POSTGRES_DB: xreader
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xreader"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: {}
