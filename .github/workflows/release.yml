name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- GHCR (always) ----
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GHCR metadata
        id: ghcr_meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=auto
          tags: type=semver,pattern={{version}}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.ghcr_meta.outputs.tags }}
          labels: ${{ steps.ghcr_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Docker Hub (only when DOCKERHUB_TOKEN secret is configured) ----
      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Hub metadata
        if: env.HAS_DOCKERHUB == 'true'
        id: dh_meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/razeencheng/xreader
          flavor: latest=auto
          tags: type=semver,pattern={{version}}

      - name: Build and push to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.dh_meta.outputs.tags }}
          labels: ${{ steps.dh_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
